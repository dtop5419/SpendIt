{% extends "base.html" %}
{% block title %}Товары{% endblock %}
{% block content %}
<a href="{{ url_for('admin_panel') }}" class="btn btn-outline-secondary mb-3">← Назад</a>
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Управление товарами</h2>
  <a href="{{ url_for('admin_add_product') }}" class="btn btn-success">➕ Добавить товар</a>
</div>
<table class="table table-striped">
  <thead>
    <tr><th>ID</th><th>Название</th><th>Категория</th><th>Цена</th><th>Действия</th></tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.category }}</td>
      <td>{{ p.price }} ₽</td>
      <td>
        <a href="{{ url_for('admin_edit_product', product_id=p.id) }}" class="btn btn-sm btn-primary">✏️</a>
        <a href="{{ url_for('admin_delete_product', product_id=p.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить товар?')">🗑️</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
